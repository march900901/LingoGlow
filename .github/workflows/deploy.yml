name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Backup custom pubspec
        run: cp pubspec.yaml pubspec.yaml.bak

      - name: Generate Web platform template
        run: flutter create --platforms=web .

      - name: Restore custom pubspec
        run: cp pubspec.yaml.bak pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web Version with debugging log
        run: |
          flutter build web --release --base-href "/LingoGlow/" > build_output.log 2>&1 || (
            echo "=== BUILD FAILED ==="
            echo "=== RUNNING ANALYZE ==="
            flutter analyze || true
            echo "=== DETAILED BUILD OUTPUT ==="
            cat build_output.log
            exit 1
          )

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

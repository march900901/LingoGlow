name: lingo_glow
description: "LingoGlow - Premium Spaced Repetition Vocabulary Trainer App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Cloud Database & Auth
  supabase_flutter: '>=2.5.0 <2.15.0'

  # State Management
  provider: ^6.1.2


  # Local Cache and Offline Mode
  shared_preferences: ^2.2.3

  # Premium UI Assets
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
